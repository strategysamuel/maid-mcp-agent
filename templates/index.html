<!DOCTYPE html>
<html>
<head>
    <title>Maid Matching Agent</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 40px;
        }
        textarea {
            width: 100%;
            height: 80px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
        #response {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>🤖 Maid Matching Agent</h2>

<textarea id="query" placeholder="Describe your requirement (e.g., Need a maid for elderly care)"></textarea><br>

<button onclick="sendQuery()">Search</button>

<div id="response"></div>

<script>
async function sendQuery() {
    const query = document.getElementById("query").value;

    const res = await fetch("/query", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query: query })
    });

    const data = await res.json();
    document.getElementById("response").innerText = "Searching...";
}
</script>

</body>
</html>
